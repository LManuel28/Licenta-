# .gitleaks.toml
# Configurație Gitleaks pentru proiectul TramEvents
# Documentație: https://github.com/gitleaks/gitleaks

title = "TramEvents Gitleaks Config"

[extend]
# Extinde regulile default ale Gitleaks
useDefault = true

# ── Reguli personalizate adăugate ──
[[rules]]
id = "api-key-generic"
description = "Cheie API generică"
regex = '''(?i)(api[_\-]?key|apikey)\s*[=:]\s*['"]?[A-Za-z0-9_\-]{20,}['"]?'''
tags = ["api-key"]

# ── Excluderi ──
[allowlist]
description = "Excluderi globale pentru fișiere cunoscute"
paths = [
  # Fișiere de configurare care pot conține valori demo
  '''^\.htmlhintrc$''',
  '''^\.eslintrc\.json$''',
  '''^playwright\.config\.js$''',
  # Node modules
  '''node_modules''',
  # Rapoarte generate
  '''playwright-report''',
  '''test-results''',
]
