name: CI/CD – TramEvents Formular

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1: Linting — HTMLHint + ESLint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: "🔍 Linting (HTMLHint + ESLint)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalare dependențe
        run: npm install

      - name: HTMLHint – verificare HTML
        run: npx htmlhint app/index.html --config .htmlhintrc
        continue-on-error: false

      - name: ESLint – verificare JavaScript
        run: npx eslint app/script.js --max-warnings=20
        continue-on-error: false

  # ────────────────────────────────────────────────────────────────
  # JOB 2: Teste Playwright în browser
  # ────────────────────────────────────────────────────────────────
  test:
    name: "🧪 Teste Playwright (Chromium + Firefox)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalare dependențe Node
        run: npm install

      - name: Instalare browsere Playwright
        run: npx playwright install --with-deps chromium firefox

      - name: Rulare teste Playwright
        run: npx playwright test
        env:
          CI: true

      - name: Salvare raport teste (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ────────────────────────────────────────────────────────────────
  # JOB 3: Scanare secrete cu Gitleaks
  # ────────────────────────────────────────────────────────────────
gitleaks:
    name: "🔐 Scanare secrete (Gitleaks)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rulare Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────
  # JOB 4: Build Docker + Scanare Trivy
  # ────────────────────────────────────────────────────────────────
  docker-security:
    name: "🐳 Docker Build + Trivy Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout cod
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagine Docker
        run: |
          docker build -t tramevents-formular:${{ github.sha }} .
          docker tag tramevents-formular:${{ github.sha }} tramevents-formular:latest

      - name: Instalare Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Trivy – scanare vulnerabilități imagine Docker
        run: |
          trivy image \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            --no-progress \
            --format table \
            tramevents-formular:latest

      - name: Trivy – raport SARIF (pentru GitHub Security tab)
        run: |
          trivy image \
            --exit-code 0 \
            --format sarif \
            --output trivy-results.sarif \
            tramevents-formular:latest

      - name: Upload raport Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy – scanare CRITICĂ (eșuează pipeline dacă există CVE critice)
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --no-progress \
            tramevents-formular:latest
        continue-on-error: true

      - name: Salvare imagine Docker (artifact)
        run: docker save tramevents-formular:latest | gzip > tramevents-formular.tar.gz

      - name: Upload imagine Docker ca artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: tramevents-formular.tar.gz
          retention-days: 7

  # ────────────────────────────────────────────────────────────────
  # JOB 5: Summary final
  # ────────────────────────────────────────────────────────────────
  summary:
    name: "✅ Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [lint, test, gitleaks, docker-security]
    if: always()

    steps:
      - name: Afișare status pipeline
        run: |
          echo "## 📊 Rezultate Pipeline CI/CD – TramEvents" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Teste Playwright | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker + Trivy | ${{ needs.docker-security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\` | Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
